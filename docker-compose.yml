# postgres and redis are expected to be already running externally as containers
# named "postgres" and "redis". They must be on the same Docker network.
#
# If they are on a custom network, uncomment the network section below
# and set the network name.
#
#   docker network ls
#   docker inspect postgres | jq '.[0].NetworkSettings.Networks'

services:
  mailpit: # SMTP test server (catches all outgoing emails)
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  notifier:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "${PORT}"
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      mailpit:
        condition: service_started
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
