# Production docker-compose for Notifier.
#
# Prerequisites:
#   - PostgreSQL instance (update DATABASE_URL in .env.prod)
#   - SMTP relay or transactional email service (set SMTP_* in .env.prod)
#
# All three must be reachable on the same Docker network, or via
# publicly resolvable hostnames if not using a network.
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Or with Docker Compose v2:
#   docker compose -f docker-compose.prod.yml up -d

services:
  notifier:
    container_name: notifier-server
    image: notifier-server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "${PORT}"
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dokploy-network

  notifier-client:
    container_name: notifier-client
    image: notifier-client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    expose:
      - "80"
    ports:
      - "${CLIENT_PORT}:80"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dokploy-network

  redis:
    container_name: notifier-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network

volumes:
  redis_data:

networks:
  dokploy-network:
    external: true
