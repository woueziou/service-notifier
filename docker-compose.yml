# postgres is expected to be already running externally as a container
# named "postgres". It must be on the same Docker network.
#
# If they are on a custom network, uncomment the network section below
# and set the network name.
#
#   docker network ls
#   docker inspect postgres | jq '.[0].NetworkSettings.Networks'

services:
  mailpit: # SMTP test server (catches all outgoing emails)
    container_name: notifier-mailpit
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025"     # Web UI

  notifier:
    container_name: notifier-server
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "${PORT}"
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      mailpit:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - dokploy-network

  redis:
    container_name: notifier-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network

  notifier-client:
    container_name: notifier-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    expose:
      - "80"
    ports:
      - "${CLIENT_PORT:-80}:80"
    env_file:
      - ./client/.env
    networks:
      - dokploy-network

volumes:
  redis_data:

networks:
  dokploy-network:
    external: true
